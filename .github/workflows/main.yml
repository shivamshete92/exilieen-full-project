name: Deploy Full-Stack to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3️⃣ Copy frontend and backend using rsync
      - name: Sync project to EC2
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" frontend/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/frontend/
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" backend/ ${{ secrets.EC2_USER }}@${{ s_
