name: Deploy Full-Stack to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3️⃣ Copy frontend and backend using rsync (faster than scp)
      - name: Sync project to EC2
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" frontend/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/frontend/
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" backend/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/backend/

      # 4️⃣ SSH into EC2 and deploy apps safely
      - name: Deploy apps on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # ---------------- Backend ----------------
            cd /home/ubuntu/backend
            npm install
            pm2 restart backend || pm2 start server.js --name backend

            # ---------------- Frontend ----------------
            cd /home/ubuntu/frontend
            npm install
            npm run build
            sudo pm2 restart frontend || sudo pm2 serve build 80 --name frontend
          EOF
