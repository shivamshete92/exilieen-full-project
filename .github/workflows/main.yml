name: Deploy Full-Stack to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3️⃣ Copy frontend and backend to EC2
      - name: Copy project to EC2
        run: |
          scp -o StrictHostKeyChecking=no -r frontend ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/
          scp -o StrictHostKeyChecking=no -r backend ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/

      # 4️⃣ SSH into EC2 and deploy apps
      - name: Deploy apps on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # ---------------- Backend ----------------
            cd /home/ubuntu/backend
            npm install
            pm2 stop backend || true
            pm2 start server.js --name backend

            # ---------------- Frontend ----------------
            cd /home/ubuntu/frontend
            npm install
            npm run build
            sudo pm2 stop frontend || true
            sudo pm2 serve build 80 --name frontend
          EOF
